name: code style

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pint:
    runs-on: ubuntu-latest

    name: Laravel Pint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Check code style with Pint
        run: composer lint
